<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Terminal v2.4</title>
    <style>
        :root {
            --term-bg: #0c0c0c;
            --term-green: #15ff00;
            --term-white: #e0e0e0;
            --term-blue: #3b82f6;
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        #terminal-window {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            background-color: var(--term-bg);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
        }

        #terminal-header {
            background-color: #333;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        #terminal-body {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            color: var(--term-white);
            font-size: 16px;
            line-height: 1.4;
        }

        .output-line { margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; }
        .command-line { color: var(--term-green); font-weight: bold; }
        .dir { color: var(--term-blue); }
        .error { color: #ff5f56; }
        .success { color: var(--term-green); font-weight: bold; padding: 10px; border: 1px dashed var(--term-green); margin-top: 10px; display: inline-block; }

        #input-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #prompt { color: var(--term-green); font-weight: bold; white-space: nowrap; }
        #user-input {
            background: transparent;
            border: none;
            color: var(--term-white);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            caret-color: var(--term-green);
        }

        /* Scrollbar styling */
        #terminal-body::-webkit-scrollbar { width: 8px; }
        #terminal-body::-webkit-scrollbar-track { background: transparent; }
        #terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="terminal-window" onclick="document.getElementById('user-input').focus()">
        <div id="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span style="color: #888; font-size: 12px; margin-left: 10px;">bash — 80x24</span>
        </div>
        <div id="terminal-body">
            <div class="output-line">Welcome to Linux 5.15.0-generic (x86_64)</div>
            <div class="output-line">Documentation: https://help.ubuntu.com</div>
            <div class="output-line">Last login: Fri Oct 11 14:22:01 2024 from 192.168.1.104</div>
            <div class="output-line" style="margin-bottom: 20px;">Type 'help' for available commands.</div>
            <div id="history"></div>
            <div id="input-container">
                <span id="prompt">user@mainframe:~$ </span>
                <input type="text" id="user-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        const historyContainer = document.getElementById('history');
        const inputField = document.getElementById('user-input');
        const promptSpan = document.getElementById('prompt');
        const terminalBody = document.getElementById('terminal-body');

        // Virtual File System
        const fs = {
            '/': {
                'home': {
                    'user': {
                        'documents': {
                            'project_alpha.txt': 'Project Alpha status: Redacted. See /mnt/backups for details.',
                            'todo.list': '1. Fix kernel leak\n2. Update vault protocol\n3. Hide the key'
                        },
                        'hint.txt': 'The mainframe password is NOT in the user directory.\nNavigate to the root and check /mnt/backups.'
                    }
                },
                'mnt': {
                    'backups': {
                        'log_2024.01.txt': 'System stable. No errors detected.',
                        'log_2024.02.txt': 'Critical error in sector 7. Access denied.',
                        '.secret_config': 'MAINFRAME_ACCESS_KEY: QUANTUM_FLUX_882'
                    }
                },
                'bin': {},
                'etc': {},
                'var': {}
            }
        };

        let currentPath = ['home', 'user'];

        function getDir(pathArray) {
            let current = fs['/'];
            for (const part of pathArray) {
                if (current[part]) {
                    current = current[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        function updatePrompt() {
            const pathStr = currentPath.length === 0 ? '/' : '/' + currentPath.join('/');
            const displayPath = pathStr.replace('/home/user', '~');
            promptSpan.innerText = `user@mainframe:${displayPath}$ `;
        }

        function addOutput(text, className = '') {
            const div = document.createElement('div');
            div.className = 'output-line ' + className;
            div.innerText = text;
            historyContainer.appendChild(div);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const fullCommand = inputField.value.trim();
                const [command, ...args] = fullCommand.split(' ');
                
                // Add command to history view
                const cmdLine = document.createElement('div');
                cmdLine.className = 'output-line';
                cmdLine.innerHTML = `<span class="command-line">${promptSpan.innerText}</span> ${fullCommand}`;
                historyContainer.appendChild(cmdLine);
                
                processCommand(command, args);
                
                inputField.value = '';
                updatePrompt();
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }
        });

        function processCommand(cmd, args) {
            if (!cmd) return;

            const currentDir = getDir(currentPath);

            switch (cmd.toLowerCase()) {
                case 'help':
                    addOutput('Available commands: ls, cd, cat, pwd, clear, whoami, help');
                    break;

                case 'whoami':
                    addOutput('user');
                    break;

                case 'pwd':
                    addOutput('/' + currentPath.join('/'));
                    break;

                case 'clear':
                    historyContainer.innerHTML = '';
                    break;

                case 'ls':
                    const showAll = args.includes('-a');
                    let files = Object.keys(currentDir);
                    if (!showAll) {
                        files = files.filter(f => !f.startsWith('.'));
                    }
                    if (files.length === 0) {
                        addOutput('');
                    } else {
                        const formatted = files.map(f => {
                            return typeof currentDir[f] === 'object' ? f + '/' : f;
                        }).join('  ');
                        addOutput(formatted);
                    }
                    break;

                case 'cd':
                    const target = args[0];
                    if (!target || target === '~') {
                        currentPath = ['home', 'user'];
                    } else if (target === '/') {
                        currentPath = [];
                    } else if (target === '..') {
                        if (currentPath.length > 0) currentPath.pop();
                    } else {
                        // Handle relative paths
                        const parts = target.split('/').filter(p => p.length > 0);
                        let tempPath = [...currentPath];
                        
                        // Check if absolute path
                        if (target.startsWith('/')) {
                            tempPath = target.split('/').filter(p => p.length > 0);
                        } else {
                            tempPath.push(...parts);
                        }

                        if (getDir(tempPath) && typeof getDir(tempPath) === 'object') {
                            currentPath = tempPath;
                        } else {
                            addOutput(`bash: cd: ${target}: No such directory`, 'error');
                        }
                    }
                    break;

                case 'cat':
                    const fileName = args[0];
                    if (!fileName) {
                        addOutput('Usage: cat [filename]');
                    } else if (currentDir[fileName] && typeof currentDir[fileName] === 'string') {
                        addOutput(currentDir[fileName]);
                        // Check for win condition
                        if (fileName === '.secret_config') {
                            addOutput('-------------------------------------------');
                            addOutput('ALERT: ACCESS KEY DETECTED', 'success');
                            addOutput('Final Code: QUANTUM_FLUX_882', 'success');
                            addOutput('-------------------------------------------');
                        }
                    } else if (currentDir[fileName] && typeof currentDir[fileName] === 'object') {
                        addOutput(`cat: ${fileName}: Is a directory`, 'error');
                    } else {
                        addOutput(`cat: ${fileName}: No such file`, 'error');
                    }
                    break;

                default:
                    addOutput(`bash: ${cmd}: command not found`, 'error');
            }
        }

        updatePrompt();
    </script>
</body>
</html>
