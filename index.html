<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraction Gateway | Secure</title>
    <style>
        body {
            background-color: #f4f7f6;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .gateway-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border-top: 5px solid #27ae60;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        p.description {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-section {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            color: #95a5a6;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font-family: monospace;
        }

        input:focus {
            outline: none;
            border-color: #27ae60;
        }

        .verify-btn {
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background-color 0.2s;
        }

        .verify-btn:active {
            transform: scale(0.98);
        }

        .verify-btn:hover {
            background-color: #2ecc71;
        }

        #result-area {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .error {
            background-color: #fdeaea;
            color: #c0392b;
            border: 1px solid #f5b7b1;
        }

        .success {
            background-color: #eafaf1;
            color: #27ae60;
            border: 2px dashed #27ae60;
        }

        .victory-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .lock-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .nav-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            flex: 1;
            padding: 8px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.9;
        }

        .nav-btn.alt {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="lock-icon">🔒</div>
        <h1>Data Extraction Point</h1>
        <p class="description">Identity verification required. Enter the three authorization sequences to bypass the final security layer.</p>
        
        <div class="input-section">
            <label for="terminalCode">Terminal Access Key</label>
            <input type="text" id="terminalCode" placeholder="Enter key..." autocomplete="off">
        </div>

        <div class="input-section">
            <label for="kernelCode">Kernel Master Key</label>
            <input type="text" id="kernelCode" placeholder="Enter key..." autocomplete="off">
        </div>

        <div class="input-section">
            <label for="adminCode">Admin Credentials</label>
            <input type="text" id="adminCode" placeholder="Enter key..." autocomplete="off">
        </div>

        <button class="verify-btn" onclick="verifyExtraction()">Verify Authorization</button>

        <div id="result-area"></div>

        <div class="nav-footer">
            <button class="nav-btn" onclick="window.location.href='terminal.html'">Terminal</button>
            <button class="nav-btn" onclick="window.location.href='kernal.html'">Kernel</button>
            <button class="nav-btn alt" onclick="window.location.href='admin.html'">Admin Panel</button>
        </div>
    </div>

    <script>
        function verifyExtraction() {
            const termInput = document.getElementById('terminalCode').value.trim();
            const kernelInput = document.getElementById('kernelCode').value.trim().toUpperCase();
            const adminInput = document.getElementById('adminCode').value.trim();
            const result = document.getElementById('result-area');

            // Internal Answer Key
            const isTermValid = termInput === "QUANTUM_FLUX_882";
            const isKernelValid = kernelInput === "VORTEX-7741-ZERO";
            const isAdminValid = adminInput === "AdminPass2026";

            result.style.display = 'block';

            if (isTermValid && isKernelValid && isAdminValid) {
                result.className = 'success';
                result.innerHTML = `
                    <strong>AUTHORIZATION SUCCESSFUL</strong><br>
                    Extraction protocols initiated.<br>
                    <a href="win.html" class="victory-link">INITIATE DOWNlOAD</a>
                `;
                document.querySelector('.lock-icon').innerText = "🔓";
            } else {
                result.className = 'error';
                
                // Identify incorrect inputs
                let errorDetails = [];
                if (!isTermValid) errorDetails.push("Terminal Access Key");
                if (!isKernelValid) errorDetails.push("Kernel Master Key");
                if (!isAdminValid) errorDetails.push("Admin Credentials");

                result.innerHTML = `
                    <strong>ACCESS DENIED</strong><br>
                    The following sequences are incorrect:<br>
                    <span style="font-size: 12px;">• ${errorDetails.join('<br>• ')}</span>
                `;
                document.querySelector('.lock-icon').innerText = "🔒";
            }
        }
    </script>
</body>
</html>
