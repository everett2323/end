<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraction Gateway | Secure</title>
    <style>
        body {
            background-color: #f4f7f6;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .gateway-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border-top: 5px solid #27ae60;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        p.description {
            color: #7f8c8d;
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-section {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            color: #95a5a6;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font-family: monospace;
        }

        input:focus {
            outline: none;
            border-color: #27ae60;
        }

        .verify-btn {
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background-color 0.2s;
        }

        .verify-btn:active {
            transform: scale(0.98);
        }

        .verify-btn:hover {
            background-color: #2ecc71;
        }

        #result-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .error {
            background-color: #fdeaea;
            color: #c0392b;
            border: 1px solid #f5b7b1;
        }

        .success {
            background-color: #eafaf1;
            color: #27ae60;
            border: 2px dashed #27ae60;
        }

        .victory-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .lock-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        /* Navigation Buttons at the bottom */
        .nav-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            flex: 1;
            padding: 10px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.9;
        }

        .nav-btn.kernel {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="lock-icon">🔒</div>
        <h1>Data Extraction Point</h1>
        <p class="description">Combine the access keys from the Mainframe Terminal and the Kernel Vault to authorize extraction.</p>
        
        <div class="input-section">
            <label for="terminalCode">Terminal Access Key</label>
            <input type="text" id="terminalCode" placeholder="Enter Terminal Key..." autocomplete="off">
        </div>

        <div class="input-section">
            <label for="kernelCode">Kernel Master Key</label>
            <input type="text" id="kernelCode" placeholder="Enter Kernel Key..." autocomplete="off">
        </div>

        <button class="verify-btn" onclick="verifyExtraction()">Verify Authorization</button>

        <div id="result-area"></div>

        <!-- New Navigation Buttons -->
        <div class="nav-footer">
            <button class="nav-btn" onclick="window.location.href='terminal.html'">Back to Terminal</button>
            <button class="nav-btn kernel" onclick="window.location.href='kernal.html'">Back to Kernel</button>
        </div>
    </div>

    <script>
        function verifyExtraction() {
            const termInput = document.getElementById('terminalCode').value.trim();
            const kernelInput = document.getElementById('kernelCode').value.trim().toUpperCase();
            const result = document.getElementById('result-area');

            // Logic:
            // Terminal Code: QUANTUM_FLUX_882
            // Kernel Code: VORTEX-7741-ZERO
            
            const isTermValid = termInput === "QUANTUM_FLUX_882";
            const isKernelValid = kernelInput === "VORTEX-7741-ZERO";

            result.style.display = 'block';

            if (isTermValid && isKernelValid) {
                result.className = 'success';
                result.innerHTML = `
                    <strong>AUTHORIZATION COMPLETE</strong><br>
                    All protocols verified. You have successfully bypassed the security grid.<br>
                    <a href="win.html" class="victory-link">INITIATE EXTRACTION</a>
                `;
                document.querySelector('.lock-icon').innerText = "🔓";
            } else {
                result.className = 'error';
                let errorMsg = "<strong>ACCESS DENIED</strong><br>";
                
                if (!isTermValid && !isKernelValid) {
                    errorMsg += "Both security segments are invalid.";
                } else if (!isTermValid) {
                    errorMsg += "Terminal Access Key rejected.";
                } else {
                    errorMsg += "Kernel Master Key rejected.";
                }
                
                result.innerHTML = errorMsg;
                document.querySelector('.lock-icon').innerText = "🔒";
            }
        }
    </script>
</body>
</html>
