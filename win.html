<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Accomplished</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trophy {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(255, 215, 0, 0.3));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #27ae60;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }

        .github-btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .github-btn:hover {
            background-color: #444;
            transform: translateY(-2px);
        }

        .github-btn svg {
            margin-right: 10px;
            fill: white;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f2d74e;
            top: -10px;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Trophy SVG -->
        <svg class="trophy" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15C13.6569 15 15 13.6569 15 12V5H9V12C9 13.6569 10.3431 15 12 15Z" fill="#FFD700"/>
            <path d="M17 7H15V10C15 11.1046 14.1046 12 13 12H11C9.89543 12 9 11.1046 9 10V7H7C5.89543 7 5 7.89543 5 9V10C5 12.2091 6.79086 14 9 14H15C17.2091 14 19 12.2091 19 10V9C19 7.89543 18.1046 7 17 7Z" fill="#FFD700"/>
            <path d="M12 15V18M12 18H9M12 18H15M8 21H16" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        </svg>

        <h1>GOOD JOB!</h1>
        <p>You have successfully escaped the security grid and retrieved all encrypted data.</p>

        <a href="https://github.com/everett2323" class="github-btn" target="_blank">
            <svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            Follow @everett2323
        </a>
    </div>

    <script>
        // Simple confetti effect
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#f2d74e', '#95c3de', '#ff9a91', '#27ae60'][Math.floor(Math.random() * 4)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
            }
        }
        window.onload = createConfetti;
    </script>
</body>
</html>
